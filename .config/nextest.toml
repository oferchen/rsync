# Nextest defaults: keep full workspace filter while relying on CLI flags for package selection.
[profile.default]
default-filter = "all()"
status-level = "fail"
final-status-level = "fail"
failure-output = "immediate-final"

[profile.ci]
default-filter = "all()"
status-level = "fail"
final-status-level = "fail"
failure-output = "immediate-final"
success-output = "never"
# Per-test timeout: fail individual tests that hang rather than hitting CI job timeout.
slow-timeout = { period = "120s", terminate-after = 3 }
# Generate JUnit XML for CI dashboards (optional, not currently used)
# junit.path = "junit.xml"

# Retry policies for tests with inherent race conditions (port binding TOCTOU,
# slow CI runner timing).
[[profile.ci.overrides]]
filter = "package(daemon) | test(execute_sparse) | binary_id(~integration_daemon)"
retries = 2

# Retry policies for tests with inherent race conditions (port binding TOCTOU,
# slow CI runner timing, transient Windows %TEMP% "Access is denied" on
# NamedTempFile creation). Mirrors profile.ci so the Windows nextest cells -
# which run under the default profile, not profile.ci - also retry these.
[[profile.default.overrides]]
filter = "package(daemon) | test(execute_sparse) | binary_id(~integration_daemon)"
retries = 2

# Daemon-spawn negotiation tests each start a real daemon thread and drive it
# over a loopback TCP connection. Under heavy concurrent execution on Windows CI
# runners the accept/handshake path can stall, leaving a client blocked long
# enough to trip the 360s slow-timeout (observed as a job-level hang). The
# client streams now carry a bounded read/write timeout so such a stall fails
# fast and the package-wide retries above absorb it; serialising these tests in
# a single-threaded group further removes cross-binary accept contention as a
# trigger. Mirrored into profile.default so the Windows nextest cells (default
# profile) get the same grouping.
[[profile.ci.overrides]]
filter = "package(daemon) & (test(daemon_negotiation) | test(daemon_protocol_28_forced) | test(run_daemon_records_log_file_entries))"
test-group = "daemon-spawn-serial"

[[profile.default.overrides]]
filter = "package(daemon) & (test(daemon_negotiation) | test(daemon_protocol_28_forced) | test(run_daemon_records_log_file_entries))"
test-group = "daemon-spawn-serial"

[test-groups.daemon-spawn-serial]
max-threads = 1

# SSH integration tests must run serially - parallel SSH sessions on the CI
# runner cause pipe corruption (garbled data, zero-length filenames, broken
# connections). Retries handle transient SSH pipe failures.
[[profile.default.overrides]]
filter = "test(test_ssh)"
test-group = "ssh-serial"
retries = 2

[test-groups.ssh-serial]
max-threads = 1

# Buffer pool global singleton tests share a process-wide OnceLock.
# Parallel execution causes init_global_buffer_pool to see already-initialized
# state from another test, leading to non-deterministic failures.
# Env var tests mutate OC_RSYNC_BUFFER_POOL_SIZE and must not run concurrently.
[[profile.default.overrides]]
filter = "test(global_pool) | test(env_var)"
test-group = "global-pool-serial"

[test-groups.global-pool-serial]
max-threads = 1

# Spill-policy env-var tests mutate OC_RSYNC_SPILL_* and must not run
# concurrently with other tests reading the same process-wide state.
[[profile.default.overrides]]
filter = "test(env_spill) | test(from_env)"
test-group = "spill-env-serial"

[test-groups.spill-env-serial]
max-threads = 1

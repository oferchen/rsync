# upstream_testsuite_known_failures.conf
# Known-failure list for tools/ci/run_upstream_testsuite.sh.
#
# Each entry is the basename of a *.test script in upstream's
# target/interop/upstream-src/rsync-${UPSTREAM_VERSION}/testsuite/ directory
# (default UPSTREAM_VERSION=3.4.2).
#
# Entries here are expected to fail. The harness reports:
#   PASS  - test passed (not in this list)
#   FAIL  - test failed unexpectedly (not in this list, exit non-zero)
#   XFAIL - test failed as expected (in this list, exit non-zero)
#   UPASS - test passed but is in this list (clean it up - remove the entry)
#
# When adding entries, include a one-line reason. Group by category.

KNOWN_FAILURES=(

  # -----------------------------------------------------------------------
  # Missing helper binaries (exit 127)
  #
  # These tests require upstream helper programs that are not built by the
  # current `make all tls getgroups` invocation in build_upstream_helpers().
  # -----------------------------------------------------------------------

  # Requires upstream's trimslash test helper (CHECK_PROGS target)
  "trimslash"
  # Requires upstream's wildmatch test helper (CHECK_PROGS target)
  "wildmatch"
  # Requires upstream's chmod-temp-dir helper (CHECK_PROGS target)
  "chmod-temp-dir"

  # -----------------------------------------------------------------------
  # Protocol / handshake (exit 12)
  # -----------------------------------------------------------------------

  # 00-hello: the smoke test checks `rsync --version` and basic transfer.
  # Exit 12 = protocol data stream error in version/capability handshake.
  "00-hello"

  # -----------------------------------------------------------------------
  # Daemon mode (exit 10)
  # -----------------------------------------------------------------------

  # daemon.test exercises rsyncd.conf features (chroot, uid/gid, module
  # options, error messages) that diverge in oc-rsyncd.
  "daemon"

  # -----------------------------------------------------------------------
  # Backup mode (exit 24)
  # -----------------------------------------------------------------------

  # --backup / --backup-dir / --suffix semantics produce different results.
  "backup"

  # -----------------------------------------------------------------------
  # Feature-specific output or behavior divergence (exit 1)
  # -----------------------------------------------------------------------

  # ACL default inheritance - setfacl/getfacl default-entry handling differs
  "acls-default"
  # --link-dest / --copy-dest / --compare-dest alternate destination logic
  "alt-dest"
  # --read-batch / --write-batch mode
  "batch-mode"
  # --chmod=CHMOD option application order or parsing
  "chmod-option"
  # --delete / --delete-during / --delete-after output or ordering
  "delete"
  # setgid directory inheritance under --perms
  "dir-sgid"
  # duplicate file-list entry handling / deduplication
  "duplicates"
  # exclude rules via lsh.sh (local shell) remote transport
  "exclude-lsh"
  # --exclude / --include pattern matching edge cases
  "exclude"
  # --executability / -E permission bit preservation
  "executability"
  # --files-from list parsing or transfer semantics
  "files-from"
  # --fuzzy / -y basis-file matching
  "fuzzy"
  # --itemize-changes / -i output format details
  "itemize"
  # --filter merge-file rule processing
  "merge"
  # missing source file error handling and exit code
  "missing"
  # --relative / -R path component handling
  "relative"
  # --copy-unsafe-links with directory symlinks
  "unsafe-byname"

  # -----------------------------------------------------------------------
  # Removed entries:
  #
  # "ssh-basic" - now passes after build_capability_string_suffix()
  #   provides the embeddable capability string for remote shell
  #   invocation, matching upstream's -e.LsfxCIvu format.
  #
  # "devices" - now passes via fakeroot on CI (UPASS). The test
  #   re-executes itself under fakeroot when not root, and fakeroot is
  #   pre-installed on ubuntu-latest.
  #
  # "chown" - now passes via fakeroot on CI (UPASS). Same fakeroot
  #   re-exec mechanism as devices.test.
  #
  # "protected-regular" - self-skips (exit 77) when not root because
  #   chown fails. Listing it here masked the natural SKIP as XFAIL.
  #   Without the entry the harness correctly reports SKIP.
  #
  # "dir-sgid" - was failing because the test harness used `make all`
  #   which does not build the `tls` helper (it is a CHECK_PROGS target).
  #   Fixed by building `tls` and `getgroups` explicitly. oc-rsync
  #   preserves OS-level setgid inheritance because no chmod is applied
  #   without --perms.
  # -----------------------------------------------------------------------
)

# upstream_testsuite_known_failures.conf
# Known-failure list for tools/ci/run_upstream_testsuite.sh.
#
# Each entry is the basename of a *.test script in upstream's
# target/interop/upstream-src/rsync-3.4.1/testsuite/ directory.
#
# Entries here are expected to fail. The harness reports:
#   PASS  - test passed (not in this list)
#   FAIL  - test failed unexpectedly (not in this list, exit non-zero)
#   XFAIL - test failed as expected (in this list, exit non-zero)
#   UPASS - test passed but is in this list (clean it up - remove the entry)
#
# When adding entries, include a one-line reason. Group by category.

KNOWN_FAILURES=(
  # --- Remote-shell tests (lsh.sh) ---
  # These tests use upstream's support/lsh.sh as $RSYNC_RSH and invoke
  # rsync via fake-localhost SSH. They require oc-rsync to interoperate
  # with upstream's rsync server-side via the -e <cmd> path. Expected
  # to need protocol-stack work to pass.
  "00-hello"

  # --- Daemon-mode tests ---
  # Tests that call build_rsyncd_conf and start an rsyncd. oc-rsync's
  # daemon config syntax must accept upstream's autogenerated config.
  # Several modules (test-from, test-to, test-scratch, test-hidden) are
  # used; behavior of "list = no" and "log format" directives may differ.
  "daemon"
  "daemon-gzip-download"
  "daemon-gzip-upload"

  # --- ACL / xattr tests ---
  # Require platform support and feature flags compiled in.
  "acls"
  "acls-default"
  "xattrs"

  # --- Device / special-file tests ---
  # Require root or CAP_MKNOD to create devices in $fromdir.
  "devices"

  # --- chown / chgrp tests ---
  # Require root to set arbitrary uid/gid; otherwise upstream's own
  # tests skip via test_skipped (exit 77) which the harness reports
  # as SKIP, not FAIL.
  "chown"

  # --- Hardlinks edge cases ---
  # Includes some scenarios that exercise INC_RECURSE sender-side
  # paths not yet enabled by default in oc-rsync.
  "hardlinks"

  # --- Time/timestamp tests ---
  # crtimes requires platform birth-time support; atimes requires
  # --atimes flag wiring on receiver side.
  "atimes"
  "crtimes"

  # --- chmod-temp-dir test ---
  # Tests that --temp-dir interacts correctly with --chmod; relies on
  # specific tempfile placement that may differ from upstream.
  "chmod-temp-dir"

  # --- ssh-basic test ---
  # Requires an actual SSH-style remote shell wrapper in test fixtures.
  "ssh-basic"

  # --- protected-regular ---
  # Tests fs.protected_regular kernel feature interaction.
  "protected-regular"

  # --- dir-sgid ---
  # Setgid bit on directories; behavior is filesystem-dependent.
  "dir-sgid"
)

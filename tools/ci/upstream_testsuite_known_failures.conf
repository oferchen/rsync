# upstream_testsuite_known_failures.conf
# Known-failure list for tools/ci/run_upstream_testsuite.sh.
#
# Each entry is the basename of a *.test script in upstream's
# target/interop/upstream-src/rsync-${UPSTREAM_VERSION}/testsuite/ directory
# (default UPSTREAM_VERSION=3.4.4).
#
# Entries here are expected to fail. The harness reports:
#   PASS  - test passed (not in this list)
#   FAIL  - test failed unexpectedly (not in this list, exit non-zero)
#   XFAIL - test failed as expected (in this list, exit non-zero)
#   UPASS - test passed but is in this list (clean it up - remove the entry)
#
# When adding entries, include a one-line reason. Group by category.

KNOWN_FAILURES=(

  # "daemon" - CI-environment-only failure on GitHub Actions hosted runners.
  #   The upstream daemon.test exits with code 10 (daemon startup) because
  #   GitHub Actions runners disable IPv6 on the loopback interface; the
  #   default dual-stack IPv6-first bind path the daemon takes when handed
  #   port=0 cannot acquire `::1`, surfaces only as an IPv4 listener, and
  #   trips a per-family bind error that the harness reads as exit 10.
  #   The same binary passes the test on every developer host (Linux,
  #   macOS) and inside the rsync-profile podman container, where IPv6
  #   loopback is available. Documented in UTS-DD-daemon-exit10 deep dive.
  #   Track real fixes under UTS-DD-daemon-exit10.1 (IPv4-only default)
  #   and UTS-DD-daemon-exit10.2 (surface per-family bind errors as
  #   warnings) before removing this entry.

  "daemon"

  # -----------------------------------------------------------------------
  # Removed entries:
  #
  # "compress-zlib-insert" - intentionally NOT listed (UTS-18.i).
  #   Exercises the basis-window mapper at BufferedMap::load_window /
  #   BufferedMap::map_ptr via zlib delta upload with insert tokens past
  #   the basis-window edge. After PRs #5566 (fail-loud bounds),
  #   #5569 (clamp window_len), #5588 (never-shrink), and #5590 (fuzz
  #   coverage), this test is expected to PASS. Keeping it out of the
  #   known-failures list ensures any regression in the zlib codec or
  #   basis-window invariants documented in docs/design/zlib-codec-
  #   invariants.md (PR #5627) surfaces as an UNEXPECTED FAIL in the
  #   Upstream Testsuite workflow rather than silently slipping under an
  #   XFAIL. See docs/audits/upstream-3.4.4-conformance.md URV-1 update
  #   for the UTS-18.j scope-correction rationale.
  #
  # "ssh-basic" - now passes after build_capability_string_suffix()
  #   provides the embeddable capability string for remote shell
  #   invocation, matching upstream's -e.LsfxCIvu format.
  #
  # "devices" - now passes via fakeroot on CI (UPASS). The test
  #   re-executes itself under fakeroot when not root, and fakeroot is
  #   pre-installed on ubuntu-latest.
  #
  # "chown" - now passes via fakeroot on CI (UPASS). Same fakeroot
  #   re-exec mechanism as devices.test.
  #
  # "protected-regular" - self-skips (exit 77) when not root because
  #   chown fails. Listing it here masked the natural SKIP as XFAIL.
  #   Without the entry the harness correctly reports SKIP.
  #
  # "dir-sgid" - was failing because the test harness used `make all`
  #   which does not build the `tls` helper (it is a CHECK_PROGS target).
  #   Fixed by building `tls` and `getgroups` explicitly. oc-rsync
  #   preserves OS-level setgid inheritance because no chmod is applied
  #   without --perms.
  # -----------------------------------------------------------------------
)

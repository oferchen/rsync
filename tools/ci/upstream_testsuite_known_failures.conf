# upstream_testsuite_known_failures.conf
# Known-failure list for tools/ci/run_upstream_testsuite.sh.
#
# Each entry is the basename of a *.test script in upstream's
# target/interop/upstream-src/rsync-${UPSTREAM_VERSION}/testsuite/ directory
# (default UPSTREAM_VERSION=3.4.2).
#
# Entries here are expected to fail. The harness reports:
#   PASS  - test passed (not in this list)
#   FAIL  - test failed unexpectedly (not in this list, exit non-zero)
#   XFAIL - test failed as expected (in this list, exit non-zero)
#   UPASS - test passed but is in this list (clean it up - remove the entry)
#
# When adding entries, include a one-line reason. Group by category.

KNOWN_FAILURES=(
  # --- Daemon-mode tests ---
  # daemon.test step 1 uses lsh.sh which invokes --server --daemon over
  # stdin/stdout. The stdio daemon path is now wired but full interop with
  # upstream's test harness (module listing format, exclude matching, atime
  # step 5) may still diverge. Keep listed until CI validates end-to-end.
  "daemon"

  # --- dir-sgid ---
  # oc-rsync gap: when creating destination directories inside a setgid
  # parent, oc-rsync does not preserve the inherited setgid bit. Upstream
  # rsync respects OS-level setgid inheritance on mkdir(). This test does
  # not require root or special environment - it runs on any filesystem
  # that supports directory setgid (ext4, xfs, etc.).
  "dir-sgid"

  # -----------------------------------------------------------------------
  # Removed entries:
  #
  # "ssh-basic" - now passes after build_capability_string_suffix()
  #   provides the embeddable capability string for remote shell
  #   invocation, matching upstream's -e.LsfxCIvu format.
  #
  # "devices" - now passes via fakeroot on CI (UPASS). The test
  #   re-executes itself under fakeroot when not root, and fakeroot is
  #   pre-installed on ubuntu-latest.
  #
  # "chown" - now passes via fakeroot on CI (UPASS). Same fakeroot
  #   re-exec mechanism as devices.test.
  #
  # "protected-regular" - self-skips (exit 77) when not root because
  #   chown fails. Listing it here masked the natural SKIP as XFAIL.
  #   Without the entry the harness correctly reports SKIP.
  # -----------------------------------------------------------------------
)

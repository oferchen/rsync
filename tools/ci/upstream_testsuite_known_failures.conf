# upstream_testsuite_known_failures.conf
# Known-failure list for tools/ci/run_upstream_testsuite.sh.
#
# Each entry is the basename of a *.test script in upstream's
# target/interop/upstream-src/rsync-3.4.1/testsuite/ directory.
#
# Entries here are expected to fail. The harness reports:
#   PASS  - test passed (not in this list)
#   FAIL  - test failed unexpectedly (not in this list, exit non-zero)
#   XFAIL - test failed as expected (in this list, exit non-zero)
#   UPASS - test passed but is in this list (clean it up - remove the entry)
#
# When adding entries, include a one-line reason. Group by category.

KNOWN_FAILURES=(
  # --- Daemon-mode tests ---
  # daemon.test step 1 uses lsh.sh which invokes --server --daemon over
  # stdin/stdout. The stdio daemon path is now wired but full interop with
  # upstream's test harness (module listing format, exclude matching, atime
  # step 5) may still diverge. Keep listed until CI validates end-to-end.
  "daemon"

  # --- Device / special-file tests ---
  # Require root or CAP_MKNOD to create devices in $fromdir.
  "devices"

  # --- chown / chgrp tests ---
  # Require root to set arbitrary uid/gid; otherwise upstream's own
  # tests skip via test_skipped (exit 77) which the harness reports
  # as SKIP, not FAIL.
  "chown"

  # --- ssh-basic test ---
  # Requires an actual SSH-style remote shell wrapper in test fixtures.
  "ssh-basic"

  # --- protected-regular ---
  # Tests fs.protected_regular kernel feature interaction.
  "protected-regular"

  # --- dir-sgid ---
  # Setgid bit on directories; behavior is filesystem-dependent.
  "dir-sgid"
)

# upstream_testsuite_timeouts.conf
# Per-test timeout overrides for tools/ci/run_upstream_testsuite_with_timeout.sh.
#
# The wrapper invokes upstream's runtests.py once per test via:
#     timeout <N>s runtests.py --name <test>
# where <N> defaults to DEFAULT_TIMEOUT (120s) and is overridden per test
# by entries in PER_TEST_TIMEOUTS below. The env var
# OC_RSYNC_PER_TEST_TIMEOUT, if set, overrides DEFAULT_TIMEOUT but not the
# per-test entries.
#
# Each PER_TEST_TIMEOUTS entry is `name=seconds`. Use the bare test name
# (matching `runtests.py --name <name>`), without the `.test` or
# `_test.py` suffix.
#
# When adding entries, include a one-line reason. Group by category.

# Default timeout applied to every test that lacks an explicit entry below.
DEFAULT_TIMEOUT=120

PER_TEST_TIMEOUTS=(

  # ---------------------------------------------------------------------
  # Known-slow tests.
  # ---------------------------------------------------------------------

  # daemon-config: spins up the rsync daemon, writes a config, reloads,
  # and exercises every module-level option. Routinely runs >2 minutes
  # on contended CI runners.
  "daemon-config=300"

  # daemon: full daemon lifecycle (listener, auth, chroot, module
  # transfer). Slow because each sub-phase forks a fresh daemon.
  "daemon=240"

  # hardlinks: enumerates a large hardlink tree and re-links it on the
  # receiver. Quadratic in worst case; bump the budget.
  "hardlinks=240"

  # files-from: walks --files-from input through the whole transfer
  # pipeline; can stall when the daemon side blocks on input.
  "files-from=240"

  # acls / xattrs: filesystem-feature probes plus full ACL/xattr
  # round-trip; slow on overlay filesystems used in containers.
  "acls=180"
  "xattrs=180"
)

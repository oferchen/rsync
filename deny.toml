# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
ignore = [
    # RUSTSEC-2023-0071 - Marvin Attack: timing side-channel in rsa 0.9.x.
    # Reaches us only via the opt-in `embedded-ssh` feature
    # (russh-keys 0.45.0 -> rsa 0.9.10). No safe upstream upgrade is
    # available; RustCrypto/RSA tracks the constant-time rewrite at
    # https://github.com/RustCrypto/RSA/issues/626. Default builds of
    # oc-rsync are unaffected. Re-evaluate after russh upgrade (#1851).
    "RUSTSEC-2023-0071",
]

[licenses]
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "0BSD",
    "CC0-1.0",
    "Artistic-2.0",
    # The project itself is GPL-3.0-or-later
    "GPL-3.0-or-later",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Single async runtime policy: tokio is the only allowed async runtime.
# Ban alternative runtimes to prevent accidental introduction via transitive deps.
deny = [
    { crate = "async-std" },
    { crate = "smol" },
    { crate = "async-executor" },
    { crate = "async-io" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

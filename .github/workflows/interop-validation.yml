name: Interop Validation

on:
  push:
    branches: [ master, main ]
    paths:
      - 'crates/**'
      - 'src/**'
      - 'tests/**'
      - 'tools/ci/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/interop-validation.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'src/**'
      - 'tests/**'
      - 'tools/ci/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/interop-validation.yml'
  workflow_dispatch:
  schedule:
    # Run nightly to catch drift in upstream versions
    - cron: '0 2 * * *'

concurrency:
  group: interop-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CACHE_VERSION: ${{ vars.CACHE_VERSION || 'v1' }}
  UPSTREAM_RSYNC_VERSION: ${{ vars.UPSTREAM_RSYNC_VERSION || '3.4.4' }}

jobs:
  build:
    name: Build oc-rsync and upstream rsync
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: interop-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          key: build

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: build-essential pkg-config zlib1g-dev curl autoconf automake libtool libacl1-dev libattr1-dev libzstd-dev liblz4-dev
          version: ${{ env.CACHE_VERSION }}

      - name: Cache upstream rsync
        id: cache-rsync
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            target/interop/upstream-src
            target/interop/upstream-install
          key: upstream-rsync-${{ env.UPSTREAM_RSYNC_VERSION }}-${{ runner.os }}-${{ hashFiles('tools/ci/run_interop.sh') }}
          restore-keys: |
            upstream-rsync-${{ env.UPSTREAM_RSYNC_VERSION }}-${{ runner.os }}-

      - name: Build upstream rsync binaries
        if: steps.cache-rsync.outputs.cache-hit != 'true'
        run: bash tools/ci/run_interop.sh build-only

      - name: Build oc-rsync
        uses: ./.github/actions/build-oc-rsync

      - name: Stage shared interop artifact
        run: |
          mkdir -p interop-artifact/bin interop-artifact/upstream
          cp target/release/oc-rsync interop-artifact/bin/
          cp -R target/interop/upstream-install/. interop-artifact/upstream/

      - name: Upload interop artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: interop-binaries
          path: interop-artifact
          retention-days: 1
          if-no-files-found: error

  validate-exit-codes:
    name: Exit Code Validation
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: interop-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          key: exit-codes
          save-if: 'false'

      - name: Download interop artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: interop-binaries
          path: interop-artifact

      - name: Restore shared binaries
        run: |
          mkdir -p target/release target/interop/upstream-install
          cp interop-artifact/bin/oc-rsync target/release/oc-rsync
          chmod +x target/release/oc-rsync
          cp -R interop-artifact/upstream/. target/interop/upstream-install/
          find target/interop/upstream-install -type f -name rsync -exec chmod +x {} +

      - name: Validate exit codes
        id: validate-exit-codes
        run: cargo xtask interop exit-codes --verbose
        continue-on-error: true

      - name: Upload validation report
        if: failure() && steps.validate-exit-codes.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: exit-code-validation-report
          path: |
            tests/interop/exit_codes/golden-*.toml
          retention-days: 7

      - name: Fail if validation failed
        if: steps.validate-exit-codes.outcome == 'failure'
        run: exit 1

  validate-messages:
    name: Message Format Validation
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: interop-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          key: messages
          save-if: 'false'

      - name: Download interop artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: interop-binaries
          path: interop-artifact

      - name: Restore shared binaries
        run: |
          mkdir -p target/release target/interop/upstream-install
          cp interop-artifact/bin/oc-rsync target/release/oc-rsync
          chmod +x target/release/oc-rsync
          cp -R interop-artifact/upstream/. target/interop/upstream-install/
          find target/interop/upstream-install -type f -name rsync -exec chmod +x {} +

      - name: Validate messages
        id: validate-messages
        run: cargo xtask interop messages --verbose
        continue-on-error: true

      - name: Upload validation report
        if: failure() && steps.validate-messages.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: message-validation-report
          path: |
            tests/interop/messages/golden-*.toml
          retention-days: 7

      - name: Fail if validation failed
        if: steps.validate-messages.outcome == 'failure'
        run: exit 1

  validate-behavior:
    name: Behavior Comparison
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: interop-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          key: behavior
          save-if: 'false'

      - name: Download interop artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: interop-binaries
          path: interop-artifact

      - name: Restore shared binaries
        run: |
          mkdir -p target/release target/interop/upstream-install
          cp interop-artifact/bin/oc-rsync target/release/oc-rsync
          chmod +x target/release/oc-rsync
          cp -R interop-artifact/upstream/. target/interop/upstream-install/
          find target/interop/upstream-install -type f -name rsync -exec chmod +x {} +

      - name: Run behavior comparison
        id: validate-behavior
        run: cargo xtask interop behavior --verbose
        continue-on-error: true

      - name: Create summary
        if: always()
        run: |
          echo "## Behavior Comparison Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.validate-behavior.outcome }}" = "success" ]; then
            echo "All behavior comparison scenarios passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "Some behavior scenarios failed. Check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if validation failed
        if: steps.validate-behavior.outcome == 'failure'
        run: exit 1

  validate-batch:
    name: Batch Mode Interop
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download interop artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: interop-binaries
          path: interop-artifact

      - name: Restore shared binaries
        run: |
          mkdir -p target/release target/interop/upstream-install
          cp interop-artifact/bin/oc-rsync target/release/oc-rsync
          chmod +x target/release/oc-rsync
          cp -R interop-artifact/upstream/. target/interop/upstream-install/
          find target/interop/upstream-install -type f -name rsync -exec chmod +x {} +

      - name: Run batch interop tests
        run: bash tests/batch_interop_test.sh

      - name: Create summary
        if: always()
        run: |
          echo "## Batch Mode Interop Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests batch file compatibility between oc-rsync and upstream rsync." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Directions tested:" >> $GITHUB_STEP_SUMMARY
          echo "- oc-rsync --write-batch -> upstream --read-batch" >> $GITHUB_STEP_SUMMARY
          echo "- upstream --write-batch -> oc-rsync --read-batch" >> $GITHUB_STEP_SUMMARY

  validate-filters:
    name: Filter Rules Interop
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download interop artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: interop-binaries
          path: interop-artifact

      - name: Restore shared binaries
        run: |
          mkdir -p target/release target/interop/upstream-install
          cp interop-artifact/bin/oc-rsync target/release/oc-rsync
          chmod +x target/release/oc-rsync
          cp -R interop-artifact/upstream/. target/interop/upstream-install/
          find target/interop/upstream-install -type f -name rsync -exec chmod +x {} +

      - name: Run filter interop tests
        run: bash tests/filter_interop_test.sh

      - name: Create summary
        if: always()
        run: |
          echo "## Filter Rules Interop Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests filter rule compatibility between oc-rsync and upstream rsync." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scenarios tested:" >> $GITHUB_STEP_SUMMARY
          echo "- \`--exclude '*.log'\` pattern matching" >> $GITHUB_STEP_SUMMARY
          echo "- \`--include/--exclude\` precedence" >> $GITHUB_STEP_SUMMARY
          echo "- \`--filter 'merge .rsync-filter'\` merge file" >> $GITHUB_STEP_SUMMARY
          echo "- \`--delete --exclude '*.keep'\` delete with filters" >> $GITHUB_STEP_SUMMARY

  validate-compress:
    name: Compression Codec Interop
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download interop artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: interop-binaries
          path: interop-artifact

      - name: Restore shared binaries
        run: |
          mkdir -p target/release target/interop/upstream-install
          cp interop-artifact/bin/oc-rsync target/release/oc-rsync
          chmod +x target/release/oc-rsync
          cp -R interop-artifact/upstream/. target/interop/upstream-install/
          find target/interop/upstream-install -type f -name rsync -exec chmod +x {} +

      - name: Run compress interop tests
        run: bash tests/compress_interop_test.sh

      - name: Create summary
        if: always()
        run: |
          echo "## Compression Codec Interop Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests compression codec compatibility between oc-rsync and upstream rsync." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Codecs tested:" >> $GITHUB_STEP_SUMMARY
          echo "- zlibx (baseline, default \`-z\`)" >> $GITHUB_STEP_SUMMARY
          echo "- zstd (\`--compress=zstd\`)" >> $GITHUB_STEP_SUMMARY
          echo "- lz4 (\`--compress=lz4\`)" >> $GITHUB_STEP_SUMMARY
          echo "- Auto-negotiation (protocol picks best common codec)" >> $GITHUB_STEP_SUMMARY

  validate-inc-recurse:
    name: INC_RECURSE Interop
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download interop artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: interop-binaries
          path: interop-artifact

      - name: Restore shared binaries
        run: |
          mkdir -p target/release target/interop/upstream-install
          cp interop-artifact/bin/oc-rsync target/release/oc-rsync
          chmod +x target/release/oc-rsync
          cp -R interop-artifact/upstream/. target/interop/upstream-install/
          find target/interop/upstream-install -type f -name rsync -exec chmod +x {} +

      - name: Run INC_RECURSE interop tests
        env:
          UPSTREAM_VERSION: ${{ env.UPSTREAM_RSYNC_VERSION }}
        run: bash tests/inc_recurse_interop_test.sh

      - name: Create summary
        if: always()
        run: |
          echo "## INC_RECURSE Interop Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests incremental recursion compatibility between oc-rsync and upstream rsync." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scenarios tested:" >> $GITHUB_STEP_SUMMARY
          echo "- oc-rsync push deep tree (5 levels)" >> $GITHUB_STEP_SUMMARY
          echo "- upstream client with --rsync-path=oc-rsync" >> $GITHUB_STEP_SUMMARY
          echo "- Incremental update (add files, re-sync)" >> $GITHUB_STEP_SUMMARY
          echo "- Delete propagation with --delete" >> $GITHUB_STEP_SUMMARY
          echo "- Large directory count (100 dirs, 1000 files)" >> $GITHUB_STEP_SUMMARY

  regenerate-goldens:
    name: Regenerate Golden Files (Manual)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on workflow_dispatch
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: interop-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          key: regenerate
          save-if: 'false'

      - name: Download interop artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: interop-binaries
          path: interop-artifact

      - name: Restore shared binaries
        run: |
          mkdir -p target/release target/interop/upstream-install
          cp interop-artifact/bin/oc-rsync target/release/oc-rsync
          chmod +x target/release/oc-rsync
          cp -R interop-artifact/upstream/. target/interop/upstream-install/
          find target/interop/upstream-install -type f -name rsync -exec chmod +x {} +

      - name: Regenerate exit code goldens
        run: cargo xtask interop exit-codes --regenerate --verbose

      - name: Regenerate message goldens
        run: cargo xtask interop messages --regenerate --verbose

      - name: Upload regenerated goldens
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: regenerated-golden-files
          path: |
            tests/interop/exit_codes/golden-*.toml
            tests/interop/messages/golden-*.toml
          retention-days: 30

      - name: Create summary
        run: |
          echo "## Regenerated Golden Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Exit code goldens:" >> $GITHUB_STEP_SUMMARY
          ls -1 tests/interop/exit_codes/golden-*.toml | while read f; do
            echo "- $f" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Message goldens:" >> $GITHUB_STEP_SUMMARY
          ls -1 tests/interop/messages/golden-*.toml 2>/dev/null | while read f; do
            echo "- $f" >> $GITHUB_STEP_SUMMARY
          done || echo "- (none found)" >> $GITHUB_STEP_SUMMARY

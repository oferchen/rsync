name: MSRV Check

on:
  push:
    branches: [ master, main ]
    paths:
      - 'crates/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - '.github/workflows/msrv.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - '.github/workflows/msrv.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: msrv-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CACHE_VERSION: ${{ vars.CACHE_VERSION || 'v1' }}

jobs:
  msrv:
    name: MSRV 1.88
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust (MSRV 1.88)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: "1.88"

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: ci-${{ runner.os }}-msrv-cargo-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check workspace compiles on MSRV
        run: cargo check --locked --workspace --all-features

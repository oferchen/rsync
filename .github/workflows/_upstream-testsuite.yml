name: Upstream Testsuite

on:
  workflow_call:
    inputs:
      cache_version:
        description: 'Cache version for invalidation'
        type: string
        default: 'v1'
      upstream_rsync_version:
        description: 'Upstream rsync version for cache key'
        type: string
        default: '3.4.4'
      variant:
        description: 'Which variant(s) to run: all | nonroot | root'
        type: string
        default: 'all'

permissions:
  contents: read

jobs:
  upstream-testsuite:
    name: upstream testsuite
    if: ${{ inputs.variant == 'all' || inputs.variant == 'nonroot' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-D warnings"
      RUST_BACKTRACE: "full"
      CACHE_VERSION: ${{ inputs.cache_version }}
      UPSTREAM_RSYNC_VERSION: ${{ inputs.upstream_rsync_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: ci-${{ runner.os }}-cargo-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          key: upstream-testsuite
          cache-on-failure: true

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: build-essential pkg-config zlib1g-dev curl autoconf automake libtool libacl1-dev libattr1-dev libzstd-dev liblz4-dev libxxhash-dev
          version: ${{ env.CACHE_VERSION }}

      - name: Cache upstream rsync source
        id: cache-upstream
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            target/interop/upstream-src/rsync-${{ env.UPSTREAM_RSYNC_VERSION }}
          key: upstream-testsuite-src-${{ env.UPSTREAM_RSYNC_VERSION }}-${{ hashFiles('tools/ci/run_upstream_testsuite.sh') }}-${{ runner.os }}

      - name: Build oc-rsync (release)
        uses: ./.github/actions/build-oc-rsync

      - name: Run upstream testsuite
        id: testsuite
        env:
          OC_RSYNC_BIN: target/release/oc-rsync
          UPSTREAM_VERSION: ${{ env.UPSTREAM_RSYNC_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p target/interop
          bash tools/ci/run_upstream_testsuite.sh 2>&1 | tee target/interop/upstream-testsuite-output.log
        # No step-level continue-on-error: a non-zero exit from the harness
        # (UNEXPECTED FAIL outside known_failures.conf or UPASS regression)
        # MUST surface to the job conclusion so PRs that claim to fix an
        # upstream test can be validated against the per-test result.

      - name: Generate job summary
        if: always()
        run: |
          set -euo pipefail
          OUTPUT_LOG="target/interop/upstream-testsuite-output.log"

          echo "## Upstream Testsuite Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ ! -f "$OUTPUT_LOG" ]]; then
            echo "No test output found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Extract the summary block from the runner output
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          sed -n '/^----/,$ p' "$OUTPUT_LOG" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Highlight UPASS results - these mean known_failures.conf needs updating
          UPASS_LINES=$(grep '^UPASS' "$OUTPUT_LOG" || true)
          if [[ -n "$UPASS_LINES" ]]; then
            echo "### Unexpected Passes (UPASS)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "These tests are listed in \`tools/ci/upstream_testsuite_known_failures.conf\` but now pass." >> "$GITHUB_STEP_SUMMARY"
            echo "Remove them from the known failures list." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$UPASS_LINES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Highlight unexpected FAILs
          FAIL_LINES=$(grep '^FAIL' "$OUTPUT_LOG" || true)
          if [[ -n "$FAIL_LINES" ]]; then
            echo "### Unexpected Failures" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "These tests failed and are NOT in the known failures list." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$FAIL_LINES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Show per-test results table
          echo "<details><summary>Full test results</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | Test |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          grep -E '^(PASS|FAIL|XFAIL|UPASS|SKIP)' "$OUTPUT_LOG" | while IFS= read -r line; do
            STATUS=$(echo "$line" | awk '{print $1}')
            TEST=$(echo "$line" | awk '{print $2}')
            echo "| $STATUS | $TEST |" >> "$GITHUB_STEP_SUMMARY"
          done || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload testsuite logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upstream-testsuite-logs
          path: |
            target/interop/upstream-testsuite/
            target/interop/upstream-testsuite-output.log
          if-no-files-found: ignore
          retention-days: 14

  # ===========================================================================
  # Root leg (FAILS LOUD; not yet a required gate). The non-root job above is
  # the REQUIRED gate. This job re-runs the SAME 3.4.4 shell suite under sudo so
  # the root-only tests (chown/devices/xattrs/dir-sgid/protected-regular) that
  # self-skip as the runner user actually RUN. A non-zero harness exit now FAILS
  # this job - there is no `continue-on-error` and no run-step `|| true`, so a
  # root-only regression surfaces as a RED check instead of a silently-masked
  # green. This job is deliberately NOT in the required status checks, so a red
  # leg does not block the merge queue; it is a visible signal. Promote it to a
  # required gate once it is reliably green. The 3.4.4 shell suite has no
  # --use-tcp support (a runtests.py flag added on master), so this gate is
  # privilege-only; the transport dimension applies solely to the 3.5.0dev tracker.
  #
  # Status: the root `devices` test passes end to end (create/replace/hardlink/
  # fifo/--link-dest all byte-match upstream 3.4.4). A full sudo run is 54 pass /
  # 2 skip (crtimes, simd-checksum) / 1 FAIL: `xattrs` (a `--fake-super
  # --link-dest` hard-link divergence that also fails on master - pre-existing,
  # tracked separately). This leg will therefore show RED on that xattrs failure
  # until it is fixed; that is intended (fail loud), not a regression of this
  # change, and it does not block merges.
  # ===========================================================================
  upstream-testsuite-root:
    name: upstream testsuite (root)
    if: ${{ inputs.variant == 'all' || inputs.variant == 'root' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-D warnings"
      RUST_BACKTRACE: "full"
      CACHE_VERSION: ${{ inputs.cache_version }}
      UPSTREAM_RSYNC_VERSION: ${{ inputs.upstream_rsync_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: ci-${{ runner.os }}-cargo-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          key: upstream-testsuite-root
          cache-on-failure: true

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: build-essential pkg-config zlib1g-dev curl autoconf automake libtool libacl1-dev libattr1-dev libzstd-dev liblz4-dev libxxhash-dev
          version: ${{ env.CACHE_VERSION }}

      - name: Cache upstream rsync source
        id: cache-upstream
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            target/interop/upstream-src/rsync-${{ env.UPSTREAM_RSYNC_VERSION }}
          key: upstream-testsuite-src-${{ env.UPSTREAM_RSYNC_VERSION }}-${{ hashFiles('tools/ci/run_upstream_testsuite.sh') }}-${{ runner.os }}

      - name: Build oc-rsync (release)
        uses: ./.github/actions/build-oc-rsync

      - name: Run upstream testsuite (root)
        id: testsuite
        env:
          OC_RSYNC_BIN: target/release/oc-rsync
          UPSTREAM_VERSION: ${{ env.UPSTREAM_RSYNC_VERSION }}
        run: |
          set -uo pipefail
          mkdir -p target/interop
          # Passwordless sudo re-exec so root-only tests RUN. Forward the env
          # the harness reads (a bare `sudo` scrubs it) plus the GHA summary
          # sink. Fail loud: a non-zero harness exit fails this job so a root-only
          # test regression (devices/chown/xattrs/...) surfaces as red, not a
          # silently-masked green.|
          sudo env \
            "PATH=$PATH" \
            "OC_RSYNC_BIN=$OC_RSYNC_BIN" \
            "UPSTREAM_VERSION=$UPSTREAM_VERSION" \
            "GITHUB_ACTIONS=${GITHUB_ACTIONS:-}" \
            "GITHUB_STEP_SUMMARY=${GITHUB_STEP_SUMMARY:-}" \
            bash tools/ci/run_upstream_testsuite.sh 2>&1 \
            | tee target/interop/upstream-testsuite-root-output.log
          rc=${PIPESTATUS[0]}
          # Reclaim root-owned scratch/logs for the upload + post-job cache.
          sudo chown -R "$(id -u):$(id -g)" target/interop 2>/dev/null || true
          exit "$rc"

      - name: Upload testsuite logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upstream-testsuite-root-logs
          path: |
            target/interop/upstream-testsuite/
            target/interop/upstream-testsuite-root-output.log
          if-no-files-found: ignore
          retention-days: 14

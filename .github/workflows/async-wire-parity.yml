name: Async Wire Parity

on:
  push:
    branches: [ master, main ]
    paths:
      - 'crates/transfer/**'
      - 'crates/protocol/**'
      - 'crates/rsync_io/**'
      - '.github/workflows/async-wire-parity.yml'
  pull_request:
    paths:
      - 'crates/transfer/**'
      - 'crates/protocol/**'
      - 'crates/rsync_io/**'
      - '.github/workflows/async-wire-parity.yml'
  workflow_dispatch:

concurrency:
  group: async-wire-parity-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "full"
  CACHE_VERSION: ${{ vars.CACHE_VERSION || 'v1' }}

jobs:
  wire-parity:
    name: sync-async-wire-parity (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: ci-${{ runner.os }}-cargo-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          key: async-wire-parity

      - name: Install cargo-nextest
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2
        with:
          tool: cargo-nextest

      - name: Run sync vs async wire-byte parity test
        run: |
          cargo nextest run --locked \
            -p transfer \
            --features async \
            --no-tests=warn \
            -E 'test(sync_async_wire_parity)'

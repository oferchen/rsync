name: Async Wire Parity

on:
  push:
    branches: [ master, main ]
    paths:
      - 'crates/transfer/**'
      - 'crates/protocol/**'
      - 'crates/rsync_io/**'
      - '.github/workflows/async-wire-parity.yml'
  pull_request:
    paths:
      - 'crates/transfer/**'
      - 'crates/protocol/**'
      - 'crates/rsync_io/**'
      - '.github/workflows/async-wire-parity.yml'
  workflow_dispatch:

concurrency:
  group: async-wire-parity-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "full"
  CACHE_VERSION: ${{ vars.CACHE_VERSION || 'v1' }}

jobs:
  wire-parity:
    name: sync-async-wire-parity (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: ci-${{ runner.os }}-cargo-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          key: async-wire-parity

      - name: Install cargo-nextest
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2
        with:
          tool: cargo-nextest

      - name: Run sync vs async wire-byte parity tests
        run: |
          cargo nextest run --locked \
            -p protocol \
            --features tokio-transfer,zstd,lz4 \
            -E 'test(recv_msg_parity) | test(token_parity)'

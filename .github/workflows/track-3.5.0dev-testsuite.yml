# Nightly tracker for the upstream rsync 3.5.0dev target (RsyncProject master).
#
# WHY: oc-rsync shadows the latest upstream rsync. rsync 3.5.0 releases
# 2026-07-15. Until then, master (version.h == "3.5.0dev") is a moving target
# whose testsuite migrated from shell *.test scripts to Python (runtests.py +
# testsuite/*_test.py). This workflow runs that evolving suite against oc-rsync
# every night so the full, growing divergence set is visible BEFORE release -
# without gating any PR.
#
# NON-REQUIRED / INFORMATIONAL:
#   - Triggers: nightly schedule + manual dispatch only (never on push/PR).
#   - Not referenced by ci.yml / ci-skip.yml and not in branch protection.
#   - A 3.5.0dev build break or test failure here MUST NOT affect any PR: the
#     job surfaces the divergence (step-summary table + non-zero run status)
#     but is best-effort tracking, not a gate.
#
# The REQUIRED gate stays on the pinned 3.4.4 release tarball
# (.github/workflows/_upstream-testsuite.yml, context
# "upstream-testsuite / upstream testsuite"). This workflow does not touch it.
#
# RELEASE-DAY PLAN (2026-07-15): once 3.5.0 ships, bump the REQUIRED gate's
# pin 3.4.4 -> 3.5.0, vendor the 3.5.0 testsuite as a release tarball, and
# retire this git-ref tracker (or repoint it at the next dev branch).
#
# HARNESS-CALIBRATION STATUS. The 3.5.0dev suite is the Python *_test.py
# framework (rsyncfns.py + exitcodes.py), which drives rsync differently from
# the 3.4.4 shell suite. A plain `runtests.py --rsync-bin=oc-rsync` mis-drives
# a subset of it, so some raw FAILs were harness gaps, NOT oc divergences.
# Calibrated so the leg counts approximate the real divergence set:
#   1. setpriv exec (FIXED): fake-super/uid tests (e.g. partial_nowrite_test.py)
#      run rsync via `setpriv` with CAP_DAC_OVERRIDE dropped. The default binary
#      under /home/runner (mode 0750) is then un-traversable, so execve returned
#      ENOENT ("setpriv: failed to execute .../oc-rsync: No such file or
#      directory") and the Python harness cascaded a FileNotFoundError. The
#      git-ref driver now publishes oc-rsync to a world-traversable path
#      (/usr/local/bin, all components o+x) and points --rsync-bin there - see
#      publish_oc_rsync_bin() in tools/ci/run_upstream_testsuite.sh.
#   2. tmpfs-shadowed scratch (FIXED): the same root test unshares a mount
#      namespace and mounts a fresh tmpfs OVER /home/runner (the first non-root,
#      non-world-x parent of cwd), shadowing a scratch tree under target/interop
#      so the from-dir vanishes and rsync fails link_stat with ENOENT. The
#      git-ref driver now hosts the runtests.py scratch under a world-traversable
#      base outside that parent (/tmp) - see world_traversable_scratch_base().
#   3. Root-owned scratch: root legs leave root-owned files; the git-ref driver
#      runs the scratch tree with a chmod -R u+rwX + rm -rf teardown before AND
#      after each leg, so a mode-0 dir (xattrs/, recv-discard-nullderef/) can't
#      wedge the next leg's cleanup.
# Remaining raw FAILs that survive calibration and show a clear oc error (e.g.
# ownership-depth `--groupmap=:1` rejected, mkpath auto-creating a path without
# --mkpath, compress-options missing the --debug=NSTR line) are the genuine
# pre-release divergence worklist, not harness noise.

name: Track 3.5.0dev Testsuite

on:
  schedule:
    # 06:00 UTC nightly - off-peak, after the day's PR activity settles.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'RsyncProject ref to track (branch, tag, or sha)'
        type: string
        default: 'master'

permissions:
  contents: read

jobs:
  track-3-5-0dev:
    # Full coverage of the 3.5.0dev suite is a privilege x transport matrix:
    #   privilege=nonroot  - runs as the runner user; root-only tests SKIP.
    #   privilege=root     - runs under sudo; chown/devices/xattrs/dir-sgid/
    #                        protected-regular RUN (upstream passwordless sudo).
    #   transport=pipe     - daemon tests use the secure stdio-pipe default.
    #   transport=tcp      - --use-tcp: real loopback rsyncd, un-skips
    #                        daemon-chroot-acl + proxy-response-line-too-long.
    # All four legs are surfaced independently so a divergence is attributable
    # to a specific (privilege, transport) cell.
    name: 3.5.0dev testsuite (${{ matrix.privilege }}/${{ matrix.transport }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Best-effort tracker: never let a 3.5.0dev break look like a repo failure
    # that someone must firefight. The step summary + run status carry the
    # signal; this flag keeps every leg green so it stays purely informational.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        privilege: [nonroot, root]
        transport: [pipe, tcp]

    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      RUST_BACKTRACE: "full"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          # Share the compiled oc-rsync across all four legs (identical build).
          shared-key: track-3-5-0dev-cargo
          key: track-3-5-0dev-testsuite
          cache-on-failure: true

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          # Same autotools/dev set as the 3.4.4 gate, plus python3 for
          # runtests.py (the git-ref suite is Python) and git for the clone.
          packages: build-essential pkg-config zlib1g-dev curl autoconf automake libtool libacl1-dev libattr1-dev libzstd-dev liblz4-dev libxxhash-dev python3 git
          version: v1

      - name: Build oc-rsync (release)
        run: cargo build --locked --release --bin oc-rsync

      - name: Run 3.5.0dev testsuite (git-ref mode)
        id: testsuite
        env:
          OC_RSYNC_BIN: target/release/oc-rsync
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'master' }}
          # transport=tcp -> --use-tcp (real loopback rsyncd); pipe -> default.
          USE_TCP: ${{ matrix.transport == 'tcp' && 'yes' || 'no' }}
        run: |
          set -uo pipefail
          mkdir -p target/interop
          # Root leg: re-exec the harness under sudo (the runner has
          # passwordless sudo) so chown/devices/xattrs/dir-sgid/protected-
          # regular actually RUN instead of self-skipping. Forward the env the
          # harness reads - a bare `sudo` scrubs it. Non-root leg runs plainly.
          runner=(bash tools/ci/run_upstream_testsuite.sh)
          if [[ "${{ matrix.privilege }}" == "root" ]]; then
            runner=(sudo env
              "PATH=$PATH"
              "OC_RSYNC_BIN=$OC_RSYNC_BIN"
              "UPSTREAM_REF=$UPSTREAM_REF"
              "USE_TCP=$USE_TCP"
              "GITHUB_ACTIONS=${GITHUB_ACTIONS:-}"
              "GITHUB_STEP_SUMMARY=${GITHUB_STEP_SUMMARY:-}"
              bash tools/ci/run_upstream_testsuite.sh)
          fi
          # Best-effort: capture the driver's exit but do not fail the step -
          # continue-on-error at the job level already keeps this informational,
          # and we still want the artifact + summary to publish on divergence.
          "${runner[@]}" 2>&1 \
            | tee target/interop/track-3.5.0dev-output.log || true
          # The root leg leaves root-owned files under target/interop (the
          # runtests.py scratch + logs). Hand them back to the runner user so
          # the upload-artifact step and post-job cache can read/clean them.
          if [[ "${{ matrix.privilege }}" == "root" ]]; then
            sudo chown -R "$(id -u):$(id -g)" target/interop 2>/dev/null || true
          fi

      - name: Upload testsuite logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: track-3.5.0dev-testsuite-logs-${{ matrix.privilege }}-${{ matrix.transport }}
          path: |
            target/interop/upstream-testsuite/
            target/interop/track-3.5.0dev-output.log
          if-no-files-found: ignore
          retention-days: 14

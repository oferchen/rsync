[package]
name = "filters-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

[dependencies.filters]
path = ".."

[[bin]]
name = "fuzz_filter_parse"
path = "fuzz_targets/fuzz_filter_parse.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_filter_chain"
path = "fuzz_targets/fuzz_filter_chain.rs"
test = false
doc = false
bench = false

# Standalone workspace - not part of root workspace
[workspace]
